name: Register Discord Commands

on:
  push:
    branches:
      - master
    paths:
      - 'src/discord/interactions/commands/slash/commands/**/*.js'
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Register Discord Commands
        run: node scripts/register-commands.js
        env:
          APPLICATION_ID: ${{ secrets.APPLICATION_ID }}
          DISCORD_APP_TOKEN: ${{ secrets.DISCORD_APP_TOKEN }}
